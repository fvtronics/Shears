[package]
name = "quire"
version = "0.1.0"
authors = ["Francisco Vásquez Cuevas <fvasquez.public@fvtronics.com>"]
edition = "2024"
publish = false
# rust-version = "1.92"

[profile.release]
lto = true

[dependencies]
gettext-rs = { version = "0.7.7", features = ["gettext-system"] }
relm4 = { version = "0.11.0", features = ["libadwaita", "gnome_49"] }
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
